<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button  Group</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h3>Bootstrap Demo</h3>
        <div class="btn-group">
        <button class="btn btn-primary">one</button>
        <button class="btn btn-primary">two</button>
        <button class="btn btn-primary">three</button>
        <br/><hr/>
        <button class="btn btn-outline-primary">one</button>
        <button class="btn btn-outline-primary">two</button>
        <button class="btn btn-outline-primary">three</button>
        </div>
        <button class="btn btn-success">one</button>
        <button class="btn btn-success">two</button>
        <button class="btn btn-success">three</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
