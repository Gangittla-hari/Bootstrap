<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Controls in Bootstrap</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2>Form Demo</h2>
         <Form>
            <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="text" class="form-control" placeholder="Email" id="email"/>
        </div>
        
        <div class="mmb-3">
           <label class="form-label" for="password">Password</label>
           <input type="password" class="form-control" placeholder="Password" id="password"/>
         </div>
         <br>
         <div class="mb-3">
            <select  class="form-select">
             <option Selected>Select Number</option>
             <option value="1">one</option>
             <option value="2">two</option>
             <option value="3">three</option>
            </select>
            <div class="normal mb-3">
                <input type="checkbox" id="agree" />
                <label for="agree">Agree</label>
            </div>
         </div>
            <div class="mb-3 form-check">
                <input type="checkbox" id="agreebs" class="form-check-input" />
                <label for="agreebs" class="form-check-label">Agree</label>
              
            </div>
             <div class="mb-3 form-check">
                <input type="radio" id="radiobs" class="form-check-input" />
                <label for="radiobs" class="form-check-label">Yes/No</label>
            </div>
            <div class="from-check form-switch mb-3">
            <input
            class="form-check-input"
            type="checkbox"
            id="flexSwitchCheckDefault"            
            />
            <label class="form-check-label" for="flexSwitchCheckDefult">Default</label>   
            </div>
        </Form>
     </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
